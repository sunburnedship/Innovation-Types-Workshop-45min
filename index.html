<body>
<div class="WordSection1">

<div class="brand">Innovation Workshop · Doblin Ten Types</div>
<h1>${escapeHTML(companyName || "Innovation Analysis")}</h1>
${companyContext.trim() ? `<p class="qualifier">${escapeHTML(companyContext.trim())}</p>` : ""}
<p class="subtitle">${teamName ? `Team: ${escapeHTML(teamName)} · ` : ""}Three-way assessment</p>
<p class="meta">Generated ${escapeHTML(dateStr)} · Sources: Team scoring (43 questions), ${escapeHTML(ai1Name || "(model 1)")}, ${escapeHTML(ai2Name || "(model 2)")}</p>

<h2>Score Comparison · 0–10 Scale</h2>
<table class="scores">
<tr><th>Innovation Type</th><th>Category</th><th class="num">Team</th><th class="num">${escapeHTML(ai1Name)}</th><th class="num">${escapeHTML(ai2Name)}</th></tr>
${scoreRows}
<tr class="totals-row">
  <td colspan="2"><strong>Average</strong></td>
  <td class="num">${teamAvg !== null ? teamAvg.toFixed(2) : "—"}</td>
  <td class="num">${ai1Avg !== null ? ai1Avg.toFixed(2) : "—"}</td>
  <td class="num">${ai2Avg !== null ? ai2Avg.toFixed(2) : "—"}</td>
</tr>
<tr class="totals-row">
  <td colspan="2"><strong>Std Dev</strong></td>
  <td class="num">${fmt(teamSD)}</td>
  <td class="num">${fmt(ai1SD)}</td>
  <td class="num">${fmt(ai2SD)}</td>
</tr>
</table>

${triangulationSection}

<h2>Recommended Tactics</h2>
${tacticBlocks}

<h2>Detailed Question-Level Scoring</h2>
<p style="font-size:10pt;color:#64748B;margin-top:0;">Each question scored 0 (none), 1 (low), 2 (medium), 3 (high). Type scores normalize to 0–10.</p>
${detailedSections}

<h2>AI Analyst Responses</h2>
<h3>${escapeHTML(ai1Name)}</h3>
<div class="ai-block">${escapeHTML(ai1Raw || "(none)")}</div>
<h3>${escapeHTML(ai2Name)}</h3>
<div class="ai-block">${escapeHTML(ai2Raw || "(none)")}</div>

<p class="footer-note">Adapted from Keeley, Pikkel, Quinn &amp; Walters · Ten Types of Innovation · 2013</p>

</div>
</body>
</html>`;
  };

  const buildPlainText = () => {
    const lines = [];
    lines.push(`INNOVATION WORKSHOP — TEAM SUMMARY`);
    lines.push(`Company: ${companyName || "(unnamed)"}`);
    if (companyContext.trim()) lines.push(`Scope: ${companyContext.trim()}`);
    if (teamName) lines.push(`Team: ${teamName}`);
    lines.push(`Generated: ${new Date().toLocaleString()}`);
    lines.push("");
    lines.push(`SCORES (0-10)`);
    lines.push(`Type                          Team    ${ai1Name.padEnd(8)} ${ai2Name.padEnd(8)}`);
    lines.push(`-------------------------------------------------------------`);
    TYPES_ORDER.forEach(t => {
      const team = teamTypeScores[t];
      const teamStr = team.scored === team.total ? team.score.toFixed(2) : "—";
      const a1 = typeof ai1Scores[t] === "number" ? ai1Scores[t].toFixed(2) : "—";
      const a2 = typeof ai2Scores[t] === "number" ? ai2Scores[t].toFixed(2) : "—";
      lines.push(`${t.padEnd(28)}  ${teamStr.padStart(5)}   ${a1.padStart(6)}   ${a2.padStart(6)}`);
    });
    lines.push("");
    lines.push(`AVERAGES`);
    if (teamAvg !== null) lines.push(`Team:   ${teamAvg.toFixed(2)}`);
    if (ai1Avg !== null) lines.push(`${ai1Name}: ${ai1Avg.toFixed(2)}`);
    if (ai2Avg !== null) lines.push(`${ai2Name}: ${ai2Avg.toFixed(2)}`);
    lines.push("");
    lines.push(`TACTIC RECOMMENDATIONS`);
    if (!tacticRecs.length) lines.push("(none recorded)");
    tacticRecs.forEach((r, i) => {
      lines.push(`\n${i+1}. ${r.type} — ${r.name}`);
      lines.push(`   Justification: ${r.justification || "(none recorded)"}`);
    });
    lines.push("");
    lines.push(`PER-QUESTION SCORES`);
    TYPES_ORDER.forEach(t => {
      lines.push(`\n${t}:`);
      const qs = QUESTIONS.filter(q => q.type === t);
      qs.forEach((q, i) => {
        const v = questionScores[`${t}:${i}`];
        lines.push(`  Q${i+1} [${typeof v === "number" ? v : "—"}/3]  ${q.text}`);
      });
      if (typeEvidence[t]) lines.push(`  Evidence: ${typeEvidence[t]}`);
    });
    return lines.join("\n");
  };

  const downloadSummary = () => {
    setSummaryCopied(false);
    setSummaryOpen(true);
  };

  const safeName = () => (companyName || "company").replace(/[^a-z0-9]/gi, "_").toLowerCase();

  const downloadAsWord = () => {
    try {
      const html = buildWordHTML();
      const blob = new Blob(["\ufeff", html], { type: "application/msword;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `innovation_workshop_${safeName()}.doc`;
      a.rel = "noopener";
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        if (document.body.contains(a)) document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 100);
    } catch (e) {}
  };

  const downloadAsText = () => {
    try {
      const blob = new Blob([buildPlainText()], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `innovation_workshop_${safeName()}.txt`;
      a.rel = "noopener";
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        if (document.body.contains(a)) document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 100);
    } catch (e) {}
  };

  const copyAsText = async () => {
    try {
      await navigator.clipboard.writeText(buildPlainText());
      setSummaryCopied(true);
      setTimeout(() => setSummaryCopied(false), 2000);
    } catch (e) {
      setSummaryCopied(false);
    }
  };

  // ============================================================
  // RENDER
  // ============================================================

  return (
    <div style={{
      fontFamily: '"Inter", system-ui, -apple-system, sans-serif',
      backgroundColor: C.bg,
      color: C.text,
      minHeight: "100vh",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        body { font-feature-settings: "cv11", "ss01"; }
        .mono { font-family: "JetBrains Mono", ui-monospace, "SF Mono", monospace; letter-spacing: -0.01em; }
        .label { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: ${C.textDim}; font-weight: 500; }
        .iw-input { background: ${C.surface2}; color: ${C.text}; border: 1px solid ${C.borderMid}; border-radius: 8px; padding: 0.65rem 0.85rem; font-family: inherit; font-size: 0.95rem; outline: none; transition: all 0.15s; width: 100%; }
        .iw-input:focus { border-color: ${C.accent}; box-shadow: 0 0 0 3px ${C.accentDim}; }
        .iw-input::placeholder { color: ${C.textMuted}; }
        textarea.iw-input { resize: vertical; line-height: 1.5; font-family: inherit; }
        .iw-select { background: ${C.surface2}; color: ${C.text}; border: 1px solid ${C.borderMid}; border-radius: 8px; padding: 0.5rem 0.7rem; font-family: "JetBrains Mono", monospace; font-size: 12px; cursor: pointer; outline: none; }
        .iw-select:focus { border-color: ${C.accent}; }
        .seg-btn { transition: all 0.12s; }
        .seg-btn:hover:not(:disabled) { background: ${C.surface3} !important; border-color: ${C.borderHi} !important; }
        .recharts-cartesian-axis-tick text { font-family: "JetBrains Mono", monospace; font-size: 10px; fill: ${C.textDim}; }
        .recharts-legend-item-text { font-family: "JetBrains Mono", monospace !important; font-size: 11px !important; color: ${C.text} !important; }
        .recharts-default-tooltip { background: ${C.surface2} !important; border: 1px solid ${C.borderHi} !important; border-radius: 8px !important; font-family: "Inter", sans-serif !important; }
        .recharts-tooltip-label { color: ${C.text} !important; font-weight: 600 !important; }
        .recharts-tooltip-item { color: ${C.text} !important; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: ${C.bg}; }
        ::-webkit-scrollbar-thumb { background: ${C.surface3}; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: ${C.surfaceHi}; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.25s ease-out; }
      `}</style>

      {/* Header */}
      <header style={{
        position: "sticky", top: 0, zIndex: 50,
        backgroundColor: "rgba(10,14,20,0.85)",
        backdropFilter: "blur(12px)",
        borderBottom: `1px solid ${C.border}`,
        padding: "0.85rem 1.5rem",
      }}>
        <div style={{ maxWidth: "1320px", margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center", gap: "1rem" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
            <div style={{
              width: "32px", height: "32px",
              background: `linear-gradient(135deg, ${C.accent} 0%, ${C.config} 100%)`,
              borderRadius: "8px",
              display: "flex", alignItems: "center", justifyContent: "center",
              boxShadow: `0 0 20px ${C.accentDim}`,
            }}>
              <Sparkles size={16} color="white" strokeWidth={2.5} />
            </div>
            <div>
              <div style={{ fontSize: "14px", fontWeight: 600, lineHeight: 1.1, color: C.text }}>
                Innovation Workshop
              </div>
              <div className="mono" style={{ fontSize: "10px", color: C.textDim, marginTop: "1px" }}>
                Doblin Ten Types · 45 min
              </div>
            </div>
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
            {companyName && (
              <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", padding: "0.4rem 0.75rem", backgroundColor: C.surface2, border: `1px solid ${C.border}`, borderRadius: "999px" }}>
                <Target size={12} color={C.accentBright} />
                <span style={{ fontSize: "12px", fontWeight: 500, color: C.text }}>{companyName}</span>
                {teamName && <span style={{ fontSize: "11px", color: C.textDim }}>· {teamName}</span>}
              </div>
            )}
            <button onClick={handleReset} style={{
              padding: "0.4rem 0.75rem",
              backgroundColor: "transparent",
              color: C.textDim,
              border: `1px solid ${C.border}`,
              borderRadius: "999px",
              fontSize: "11px",
              fontWeight: 500,
              cursor: "pointer",
              display: "flex", alignItems: "center", gap: "0.35rem",
              transition: "all 0.15s",
            }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = C.borderHi; e.currentTarget.style.color = C.text; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.color = C.textDim; }}
            >
              <RotateCcw size={11} /> Reset
            </button>
          </div>
        </div>
      </header>

      {/* Phase nav */}
      <nav style={{
        padding: "0.85rem 1.5rem",
        borderBottom: `1px solid ${C.border}`,
        backgroundColor: C.bg,
        overflowX: "auto",
      }}>
        <div style={{ maxWidth: "1320px", margin: "0 auto", display: "flex", gap: "0.4rem", flexWrap: "nowrap", minWidth: "min-content" }}>
          {PHASES.map((p, i) => {
            const isActive = i === phase;
            const isDone = i < phase;
            return (
              <button
                key={i}
                onClick={() => setPhase(i)}
                style={{
                  padding: "0.5rem 0.85rem",
                  border: `1px solid ${isActive ? C.accent : isDone ? C.borderMid : C.border}`,
                  backgroundColor: isActive ? C.accentDim : "transparent",
                  color: isActive ? C.accentBright : isDone ? C.text : C.textDim,
                  borderRadius: "999px",
                  fontSize: "12px",
                  fontWeight: isActive ? 600 : 500,
                  cursor: "pointer",
                  display: "flex", alignItems: "center", gap: "0.45rem",
                  whiteSpace: "nowrap",
                  transition: "all 0.15s",
                  flexShrink: 0,
                }}
              >
                {isDone ? <CheckCircle2 size={13} color={C.success} /> : isActive ? <Circle size={13} fill={C.accent} color={C.accent} /> : <Circle size={13} />}
                <span className="mono" style={{ fontSize: "10px", opacity: 0.7 }}>{p.num}</span>
                <span>{p.title}</span>
                <span className="mono" style={{ fontSize: "10px", opacity: 0.5 }}>{p.time}</span>
              </button>
            );
          })}
        </div>
      </nav>

      <main style={{ maxWidth: "1320px", margin: "0 auto", padding: "2rem 1.5rem 4rem" }}>
        <div className="fade-in" key={phase}>
          {phase === 0 && <PhaseSetup
            companyName={companyName} setCompanyName={setCompanyName}
            companyContext={companyContext} setCompanyContext={setCompanyContext}
            teamName={teamName} setTeamName={setTeamName}
            onContinue={() => setPhase(1)}
          />}
          {phase === 1 && <PhaseDeepScore
            companyName={companyName}
            questionScores={questionScores} setQuestionScores={setQuestionScores}
            typeEvidence={typeEvidence} setTypeEvidence={setTypeEvidence}
            teamTypeScores={teamTypeScores}
            teamComplete={teamComplete}
            onContinue={() => setPhase(2)}
            onBack={() => setPhase(0)}
          />}
          {phase === 2 && <PhaseAI
            phaseNum="03" phaseTitle="First AI"
            stepNum={1}
            companyName={companyName} companyContext={companyContext}
            aiName={ai1Name} setAiName={setAi1Name}
            aiRaw={ai1Raw} setAiRaw={setAi1Raw}
            aiScores={ai1Scores} setAiScores={setAi1Scores}
            aiComplete={ai1Complete}
            copied={copied1} setCopied={setCopied1}
            onContinue={() => setPhase(3)}
            onBack={() => setPhase(1)}
            continueLabel="Second AI"
          />}
          {phase === 3 && <PhaseAI
            phaseNum="04" phaseTitle="Second AI"
            stepNum={2}
            companyName={companyName} companyContext={companyContext}
            aiName={ai2Name} setAiName={setAi2Name}
            aiRaw={ai2Raw} setAiRaw={setAi2Raw}
            aiScores={ai2Scores} setAiScores={setAi2Scores}
            aiComplete={ai2Complete}
            copied={copied2} setCopied={setCopied2}
            onContinue={() => setPhase(4)}
            onBack={() => setPhase(2)}
            continueLabel="Triangulate"
            otherAiName={ai1Name}
          />}
          {phase === 4 && <PhaseTriangulation
            companyName={companyName}
            triangulation={triangulation}
            teamAvg={teamAvg} ai1Avg={ai1Avg} ai2Avg={ai2Avg}
            ai1Name={ai1Name} ai2Name={ai2Name}
            typeEvidence={typeEvidence}
            onContinue={() => setPhase(5)}
            onBack={() => setPhase(3)}
          />}
          {phase === 5 && <PhaseTactics
            companyName={companyName}
            teamTypeScores={teamTypeScores}
            tacticRecs={tacticRecs} setTacticRecs={setTacticRecs}
            onContinue={() => setPhase(6)}
            onBack={() => setPhase(4)}
          />}
          {phase === 6 && <PhaseTakeaway
            companyName={companyName} teamName={teamName}
            teamAvg={teamAvg} ai1Avg={ai1Avg} ai2Avg={ai2Avg}
            ai1Name={ai1Name} ai2Name={ai2Name}
            triangulation={triangulation}
            tacticRecs={tacticRecs}
            downloadSummary={downloadSummary}
            onBack={() => setPhase(5)}
          />}
        </div>
      </main>

      {/* Export Modal */}
      {summaryOpen && (
        <div
          role="dialog"
          aria-modal="true"
          onClick={() => setSummaryOpen(false)}
          style={{
            position: "fixed", inset: 0,
            backgroundColor: "rgba(0,0,0,0.7)",
            backdropFilter: "blur(6px)",
            zIndex: 1000,
            display: "flex", alignItems: "center", justifyContent: "center",
            padding: "1.5rem",
            animation: "fadeIn 0.18s ease-out",
          }}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{
              backgroundColor: C.surface,
              maxWidth: "560px", width: "100%",
              border: `1px solid ${C.borderHi}`,
              borderRadius: "16px",
              padding: "1.75rem",
              boxShadow: "0 24px 60px rgba(0,0,0,0.5)",
            }}
          >
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "1rem" }}>
              <div style={{ display: "flex", gap: "0.85rem", alignItems: "flex-start" }}>
                <div style={{
                  width: "40px", height: "40px",
                  background: `linear-gradient(135deg, ${C.accent} 0%, ${C.config} 100%)`,
                  borderRadius: "10px",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  flexShrink: 0,
                }}>
                  <Download size={18} color="white" strokeWidth={2.5} />
                </div>
                <div>
                  <h3 style={{ fontSize: "1.15rem", fontWeight: 600, margin: "0 0 0.25rem", color: C.text }}>
                    Export workshop results
                  </h3>
                  <p style={{ fontSize: "0.85rem", color: C.textDim, margin: 0, lineHeight: 1.5 }}>
                    Save a formatted Word doc, plain text, or copy everything to your clipboard.
                  </p>
                </div>
              </div>
              <button
                onClick={() => setSummaryOpen(false)}
                style={{ background: "none", border: "none", cursor: "pointer", padding: "0.25rem", color: C.textDim, borderRadius: "6px" }}
                aria-label="Close"
                onMouseEnter={(e) => { e.currentTarget.style.backgroundColor = C.surface2; e.currentTarget.style.color = C.text; }}
                onMouseLeave={(e) => { e.currentTarget.style.backgroundColor = "transparent"; e.currentTarget.style.color = C.textDim; }}
              >
                <XIcon size={18} />
              </button>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: "0.6rem", marginTop: "1.25rem" }}>
              <ExportRow
                icon={<FileText size={16} color={C.accentBright} />}
                title="Microsoft Word"
                subtitle="Formatted .doc with headings, tables & color-coded categories"
                onClick={downloadAsWord}
                primary
              />
              <ExportRow
                icon={<FileText size={16} color={C.textDim} />}
                title="Plain text"
                subtitle="Lightweight .txt — works anywhere"
                onClick={downloadAsText}
              />
              <ExportRow
                icon={summaryCopied ? <Check size={16} color={C.success} /> : <Copy size={16} color={C.textDim} />}
                title={summaryCopied ? "Copied to clipboard" : "Copy plain text"}
                subtitle="Paste into Notion, Google Docs, or email"
                onClick={copyAsText}
                done={summaryCopied}
              />
            </div>

            <p style={{ fontSize: "0.75rem", color: C.textMuted, marginTop: "1.25rem", lineHeight: 1.5 }}>
              The Word file opens in Word, Google Docs, or Pages. If the download is blocked by your browser sandbox, the Copy option always works.
            </p>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// PHASE I — SETUP
// ============================================================

function PhaseSetup({ companyName, setCompanyName, companyContext, setCompanyContext, teamName, setTeamName, onContinue }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1.3fr 1fr", gap: "2.5rem", alignItems: "start" }}>
      <Card>
        <PhaseHeader num="01" title="The Company" />

        <p style={{ fontSize: "0.95rem", lineHeight: 1.6, color: C.textDim, margin: "0.5rem 0 1.5rem" }}>
          Pick a company your team can analyze in 45 minutes. The best choices are companies your team collectively knows — a recent case, a familiar brand, an industry competitor. Avoid the obscure (no shared knowledge) and the over-mythologized (Apple, Tesla — the framework loses its diagnostic power on consensus winners).
        </p>

        <Field label="Company name" required>
          <input
            type="text"
            value={companyName}
            onChange={(e) => setCompanyName(e.target.value)}
            placeholder="Patagonia · Stripe · Helion Energy"
            className="iw-input"
            style={{ fontSize: "1.1rem", fontWeight: 500 }}
            autoFocus
          />
        </Field>

        <Field label="Team name" hint="optional">
          <input
            type="text"
            value={teamName}
            onChange={(e) => setTeamName(e.target.value)}
            placeholder="Team Alpha"
            className="iw-input"
          />
        </Field>

        <Field label="Scoring scope" hint="optional · appears in report">
          <textarea
            value={companyContext}
            onChange={(e) => setCompanyContext(e.target.value)}
            placeholder="e.g., 'B2B subscription line, not consumer' · 'as of 2025' · 'healthcare division only'"
            rows={3}
            className="iw-input"
          />
        </Field>

        <div style={{ marginTop: "1.5rem" }}>
          <PrimaryButton onClick={onContinue} disabled={!companyName.trim()}>
            Begin scoring <ChevronRight size={15} />
          </PrimaryButton>
        </div>
      </Card>

      <Card subtle>
        <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.75rem" }}>
          <Layers size={14} color={C.accentBright} />
          <span className="label" style={{ color: C.accentBright }}>The Framework</span>
        </div>

        <p style={{ fontSize: "0.95rem", lineHeight: 1.6, color: C.textDim, margin: 0 }}>
          The Doblin framework decomposes innovation into <strong style={{ color: C.text }}>ten distinguishable types</strong> across three lenses:
        </p>

        <div style={{ display: "flex", flexDirection: "column", gap: "0.5rem", margin: "1rem 0 1.25rem" }}>
          <CategoryChip color={C.config} name="Configuration" desc="how the firm organizes" />
          <CategoryChip color={C.offering} name="Offering" desc="what it sells" />
          <CategoryChip color={C.experience} name="Experience" desc="how customers encounter it" />
        </div>

        <div style={{ padding: "1rem 1.1rem", backgroundColor: C.accentDim, border: `1px solid ${C.accent}40`, borderRadius: "10px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "0.4rem", marginBottom: "0.4rem" }}>
            <Zap size={13} color={C.accentBright} />
            <span className="label" style={{ color: C.accentBright }}>Five-Type Threshold</span>
          </div>
          <p style={{ fontSize: "0.88rem", lineHeight: 1.55, margin: 0, color: C.text }}>
            Keeley's research: companies innovating on <strong>5+ types simultaneously</strong> dramatically outperform single-type innovators. The framework's value is showing where a company isn't innovating.
          </p>
        </div>

        <div style={{ marginTop: "1.25rem", paddingTop: "1.25rem", borderTop: `1px solid ${C.border}` }}>
          <div className="label" style={{ marginBottom: "0.6rem" }}>Workshop · 45 min</div>
          <ul style={{ margin: 0, paddingLeft: "1.1rem", fontSize: "0.85rem", lineHeight: 1.7, color: C.textDim }}>
            <li>Score across 43 canonical questions</li>
            <li>Get assessments from <strong style={{ color: C.text }}>two</strong> AI models</li>
            <li>Triangulate three perspectives</li>
            <li>Pick 2–3 tactics from a library of 112</li>
          </ul>
        </div>
      </Card>
    </div>
  );
}

function CategoryChip({ color, name, desc }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "0.6rem", padding: "0.55rem 0.75rem", backgroundColor: C.surface2, border: `1px solid ${C.border}`, borderRadius: "8px" }}>
      <div style={{ width: "8px", height: "8px", borderRadius: "999px", backgroundColor: color, boxShadow: `0 0 8px ${color}80`, flexShrink: 0 }} />
      <span style={{ fontSize: "0.9rem", fontWeight: 600, color: C.text }}>{name}</span>
      <span style={{ fontSize: "0.82rem", color: C.textDim }}>— {desc}</span>
    </div>
  );
}

// ============================================================
// PHASE II — DEEP SCORING
// ============================================================

function PhaseDeepScore({ companyName, questionScores, setQuestionScores, typeEvidence, setTypeEvidence, teamTypeScores, teamComplete, onContinue, onBack }) {
  const completeTypes = TYPES_ORDER.filter(t => teamTypeScores[t].scored === teamTypeScores[t].total).length;
  const totalAnswered = Object.values(questionScores).filter(v => typeof v === "number").length;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: "1.25rem", flexWrap: "wrap", gap: "1rem" }}>
        <PhaseHeader num="02" title="Deep Scoring" subtitle={`Scoring ${companyName} on the 43 canonical Doblin questions`} />
        <div style={{ display: "flex", gap: "0.75rem" }}>
          <ProgressPill label="Types" value={completeTypes} total={10} />
          <ProgressPill label="Questions" value={totalAnswered} total={43} accent />
        </div>
      </div>

      <div style={{ padding: "0.85rem 1.1rem", marginBottom: "1.5rem", backgroundColor: C.accentDim, border: `1px solid ${C.accent}30`, borderRadius: "10px", display: "flex", gap: "0.75rem", alignItems: "flex-start" }}>
        <Zap size={16} color={C.accentBright} style={{ flexShrink: 0, marginTop: "2px" }} />
        <p style={{ margin: 0, fontSize: "0.9rem", lineHeight: 1.55, color: C.text }}>
          Score each question <span className="mono" style={{ color: C.accentBright }}>0</span> (none) → <span className="mono" style={{ color: C.accentBright }}>3</span> (high). Move quickly — <strong>~25 sec per question</strong>. Type scores normalize to 0–10 as you go. Optional: capture one line of evidence per type.
        </p>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: "1rem" }}>
        {TYPES_ORDER.map((typeName, idx) => (
          <TypeQuestionCard
            key={typeName}
            typeName={typeName}
            index={idx}
            questionScores={questionScores}
            setQuestionScores={setQuestionScores}
            evidence={typeEvidence[typeName]}
            setEvidence={(v) => setTypeEvidence(prev => ({ ...prev, [typeName]: v }))}
            typeScore={teamTypeScores[typeName]}
          />
        ))}
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", marginTop: "2rem" }}>
        <SecondaryButton onClick={onBack}><ChevronLeft size={15} /> Back</SecondaryButton>
        <PrimaryButton onClick={onContinue} disabled={!teamComplete}>
          {teamComplete ? "Continue to first AI" : `Score all 43 (${totalAnswered}/43)`} <ChevronRight size={15} />
        </PrimaryButton>
      </div>
    </div>
  );
}

function TypeQuestionCard({ typeName, index, questionScores, setQuestionScores, evidence, setEvidence, typeScore }) {
  const info = TYPE_INFO[typeName];
  const catColor = CATEGORY_COLORS[info.category];
  const questions = QUESTIONS.filter(q => q.type === typeName);
  const isComplete = typeScore.scored === typeScore.total;

  const setQ = (i, val) => setQuestionScores(prev => ({ ...prev, [`${typeName}:${i}`]: val }));

  return (
    <article style={{
      backgroundColor: C.surface,
      border: `1px solid ${isComplete ? `${catColor}50` : C.border}`,
      borderRadius: "12px",
      padding: "1.25rem 1.4rem",
      position: "relative",
      overflow: "hidden",
    }}>
      <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: "3px", backgroundColor: catColor, opacity: isComplete ? 1 : 0.5 }} />

      <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: "1.5rem", alignItems: "flex-start", marginBottom: "1rem" }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: "0.6rem", marginBottom: "0.4rem", flexWrap: "wrap" }}>
            <span className="mono" style={{ fontSize: "10px", color: C.textMuted }}>{String(index + 1).padStart(2, "0")}</span>
            <span style={{ display: "flex", alignItems: "center", gap: "0.4rem", padding: "0.15rem 0.55rem", backgroundColor: `${catColor}18`, border: `1px solid ${catColor}40`, borderRadius: "999px" }}>
              <div style={{ width: "5px", height: "5px", borderRadius: "999px", backgroundColor: catColor }} />
              <span className="mono" style={{ fontSize: "10px", color: catColor, fontWeight: 600, letterSpacing: "0.05em", textTransform: "uppercase" }}>{info.category}</span>
            </span>
            <span className="mono" style={{ fontSize: "10px", color: C.textMuted }}>{questions.length} questions</span>
          </div>
          <h3 style={{ fontSize: "1.25rem", fontWeight: 600, margin: "0 0 0.3rem", color: C.text, letterSpacing: "-0.01em" }}>
            {typeName}
          </h3>
          <p style={{ fontSize: "0.9rem", lineHeight: 1.5, color: C.textDim, margin: 0 }}>
            {info.definition}
          </p>
        </div>

        <ScoreTile
          score={isComplete ? typeScore.score : (typeScore.scored > 0 ? typeScore.score : null)}
          fraction={`${typeScore.scored}/${typeScore.total}`}
          color={catColor}
          dim={!isComplete}
        />
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: "0.45rem" }}>
        {questions.map((q, i) => (
          <QuestionRow
            key={i}
            number={i + 1}
            question={q.text}
            value={questionScores[`${typeName}:${i}`]}
            onChange={(v) => setQ(i, v)}
            color={catColor}
          />
        ))}
      </div>

      <div style={{ marginTop: "1rem" }}>
        <input
          type="text"
          value={evidence}
          onChange={(e) => setEvidence(e.target.value)}
          placeholder={`Evidence for ${typeName} — one line, optional`}
          className="iw-input"
          style={{ fontSize: "0.85rem", padding: "0.5rem 0.75rem" }}
        />
      </div>
    </article>
  );
}

function ScoreTile({ score, fraction, color, dim }) {
  return (
    <div style={{
      backgroundColor: dim ? C.surface2 : `${color}12`,
      border: `1px solid ${dim ? C.border : `${color}40`}`,
      borderRadius: "10px",
      padding: "0.6rem 0.95rem",
      minWidth: "100px",
      textAlign: "right",
    }}>
      <div className="label" style={{ marginBottom: "0.15rem", textAlign: "right" }}>Score</div>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "flex-end", gap: "0.3rem" }}>
        <span className="mono" style={{
          fontSize: "1.7rem", fontWeight: 600,
          color: score == null ? C.textMuted : color,
          fontVariantNumeric: "tabular-nums", lineHeight: 1,
        }}>
          {score == null ? "—" : score.toFixed(1)}
        </span>
        <span className="mono" style={{ fontSize: "11px", color: C.textMuted }}>/10</span>
      </div>
      <div className="mono" style={{ fontSize: "10px", color: C.textMuted, marginTop: "0.25rem" }}>{fraction}</div>
    </div>
  );
}

function QuestionRow({ number, question, value, onChange, color }) {
  const ANCHORS = ["None", "Low", "Med", "High"];
  const isAnswered = typeof value === "number";
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: "auto 1fr auto",
      alignItems: "center",
      gap: "0.85rem",
      padding: "0.5rem 0.7rem",
      backgroundColor: isAnswered ? C.surface2 : "transparent",
      border: `1px solid ${isAnswered ? C.border : "transparent"}`,
      borderRadius: "8px",
      transition: "all 0.15s",
    }}>
      <span className="mono" style={{ fontSize: "10px", color: C.textMuted, fontWeight: 600 }}>Q{number}</span>
      <p style={{ fontSize: "0.88rem", lineHeight: 1.45, margin: 0, color: C.text }}>{question}</p>
      <div style={{ display: "flex", gap: "0.2rem" }}>
        {[0, 1, 2, 3].map(n => {
          const selected = value === n;
          return (
            <button
              key={n}
              onClick={() => onChange(n)}
              className="seg-btn mono"
              style={{
                width: "42px", padding: "0.35rem 0",
                border: `1px solid ${selected ? color : C.border}`,
                backgroundColor: selected ? `${color}25` : C.surface2,
                color: selected ? color : C.textDim,
                borderRadius: "6px",
                fontSize: "11px", fontWeight: 600,
                cursor: "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", gap: "1px",
                lineHeight: 1.1,
              }}
            >
              <span style={{ fontSize: "13px", fontWeight: 700 }}>{n}</span>
              <span style={{ fontSize: "8px", letterSpacing: "0.04em", opacity: 0.8, textTransform: "uppercase" }}>{ANCHORS[n]}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ============================================================
// PHASE III & IV — AI
// ============================================================

function PhaseAI({ phaseNum, phaseTitle, stepNum, companyName, companyContext, aiName, setAiName, aiRaw, setAiRaw, aiScores, setAiScores, aiComplete, copied, setCopied, onContinue, onBack, continueLabel, otherAiName }) {
  const prompt = useMemo(() => buildAIPrompt(companyName, companyContext), [companyName, companyContext]);

  const handleManualScore = (typeName, val) => {
    const num = val === "" ? null : parseFloat(val);
    if (num !== null && (isNaN(num) || num < 0 || num > 10)) return;
    setAiScores(prev => ({ ...prev, [typeName]: num }));
  };

  const enteredCount = TYPES_ORDER.filter(t => typeof aiScores[t] === "number").length;
  const trimmedName = aiName.trim();
  const canProceed = aiComplete && trimmedName.length > 0;

  const copyPrompt = async () => {
    try {
      await navigator.clipboard.writeText(prompt);
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    } catch (e) {}
  };

  return (
    <div>
      <PhaseHeader
        num={phaseNum}
        title={phaseTitle}
        subtitle={otherAiName
          ? `For triangulation, get a different model's perspective. Use something other than ${otherAiName || "the first AI"}.`
          : "An independent assessment from an AI analyst."}
      />

      <div style={{ display: "flex", alignItems: "center", gap: "0.85rem", margin: "1.25rem 0 1.5rem", flexWrap: "wrap" }}>
        <span className="label" style={{ flexShrink: 0 }}>Model & Version</span>
        <input
          type="text"
          value={aiName}
          onChange={(e) => setAiName(e.target.value)}
          placeholder="e.g., Claude Sonnet 4.6 · GPT-5 · Gemini 2.5 Pro · Llama 3.3 70B"
          className="iw-input"
          style={{ maxWidth: "480px", flex: 1, minWidth: "240px" }}
        />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1.5rem" }}>
        <Card>
          <StepLabel num={`${stepNum}A`} title={trimmedName ? `Send this prompt to ${trimmedName}` : "Send this prompt to your AI"} />
          <p style={{ fontSize: "0.9rem", lineHeight: 1.55, color: C.textDim, margin: "0 0 1rem" }}>
            Open your model's chat interface in a new tab and paste the prompt below.
          </p>

          <div style={{ position: "relative" }}>
            <pre className="mono" style={{
              backgroundColor: C.bg,
              color: C.text,
              padding: "1rem 1.1rem",
              fontSize: "0.78rem",
              lineHeight: 1.6,
              overflow: "auto",
              maxHeight: "320px",
              whiteSpace: "pre-wrap",
              margin: 0,
              border: `1px solid ${C.border}`,
              borderRadius: "10px",
            }}>
              {prompt}
            </pre>
            <button
              onClick={copyPrompt}
              className="mono"
              style={{
                position: "absolute", top: "0.6rem", right: "0.6rem",
                padding: "0.4rem 0.7rem",
                backgroundColor: copied ? C.success : C.accent,
                color: "white", border: "none", borderRadius: "6px",
                fontSize: "10px", fontWeight: 600, letterSpacing: "0.06em",
                textTransform: "uppercase", cursor: "pointer",
                display: "flex", alignItems: "center", gap: "0.35rem",
                transition: "all 0.15s",
              }}
            >
              {copied ? <><Check size={11} /> Copied</> : <><Copy size={11} /> Copy</>}
            </button>
          </div>

          <div style={{ marginTop: "0.85rem", padding: "0.7rem 0.85rem", backgroundColor: `${C.success}10`, border: `1px solid ${C.success}30`, borderRadius: "8px", fontSize: "0.8rem", color: C.text, display: "flex", gap: "0.5rem", alignItems: "flex-start" }}>
            <Zap size={13} color={C.success} style={{ flexShrink: 0, marginTop: "2px" }} />
            <span><strong style={{ color: C.success }}>Tip:</strong> Enable web search if your model supports it — without current data, the AI may score using year-old training data.</span>
          </div>
        </Card>

        <Card>
          <StepLabel num={`${stepNum}B`} title={trimmedName ? `Paste ${trimmedName}'s response` : "Paste the AI's response"} />
          <p style={{ fontSize: "0.9rem", lineHeight: 1.55, color: C.textDim, margin: "0 0 1rem" }}>
            Paste the full reply. Scores are auto-extracted; verify or fix any that didn't parse.
          </p>

          <textarea
            value={aiRaw}
            onChange={(e) => setAiRaw(e.target.value)}
            placeholder={trimmedName ? `Paste ${trimmedName}'s full response here...` : "Paste the AI's full response here..."}
            rows={10}
            className="iw-input"
            style={{ fontSize: "0.88rem", minHeight: "200px", fontFamily: 'inherit' }}
          />

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: "1rem", marginBottom: "0.5rem" }}>
            <span className="label">Extracted Scores</span>
            <span className="mono" style={{ fontSize: "11px", color: enteredCount === 10 ? C.success : C.textDim }}>{enteredCount}/10</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.4rem 0.85rem", padding: "0.85rem", backgroundColor: C.surface2, border: `1px solid ${C.border}`, borderRadius: "10px" }}>
            {TYPES_ORDER.map(t => (
              <div key={t} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: "0.82rem" }}>
                <span style={{ color: C.text }}>{t}</span>
                <input
                  type="number" min={0} max={10} step={0.1}
                  value={aiScores[t] ?? ""}
                  onChange={(e) => handleManualScore(t, e.target.value)}
                  className="mono"
                  style={{
                    width: "55px", padding: "0.2rem 0.45rem",
                    fontSize: "0.82rem", textAlign: "right",
                    border: `1px solid ${C.borderMid}`, borderRadius: "5px",
                    backgroundColor: C.bg, color: C.text,
                    outline: "none", fontVariantNumeric: "tabular-nums",
                  }}
                />
              </div>
            ))}
          </div>
        </Card>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", marginTop: "2rem" }}>
        <SecondaryButton onClick={onBack}><ChevronLeft size={15} /> Back</SecondaryButton>
        <PrimaryButton onClick={onContinue} disabled={!canProceed}>
          {!trimmedName
            ? "Enter the model name"
            : aiComplete
              ? continueLabel
              : `Enter all 10 (${enteredCount}/10)`} <ChevronRight size={15} />
        </PrimaryButton>
      </div>
    </div>
  );
}

// ============================================================
// PHASE V — TRIANGULATION
// ============================================================

function PhaseTriangulation({ companyName, triangulation, teamAvg, ai1Avg, ai2Avg, ai1Name, ai2Name, typeEvidence, onContinue, onBack }) {
  const chartData = triangulation.map(item => ({
    name: item.type,
    shortName: item.type.replace("Customer Engagement", "Cust. Eng.").replace("Product Performance", "Prod. Perf.").replace("Product System", "Prod. Sys."),
    Team: item.team,
    [ai1Name]: item.ai1,
    [ai2Name]: item.ai2,
  }));

  const consensus = triangulation.filter(i => i.spread <= 1.5).sort((a, b) => b.team - a.team);
  const teamVsAIs = [...triangulation].sort((a, b) => Math.abs(b.teamVsAI) - Math.abs(a.teamVsAI)).slice(0, 3);
  const aisDisagree = [...triangulation].sort((a, b) => b.aiSpread - a.aiSpread).slice(0, 3);

  return (
    <div>
      <PhaseHeader num="05" title="Triangulation" subtitle={`Where do you, ${ai1Name}, and ${ai2Name} agree about ${companyName}? Where does each see something the others miss?`} />

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "0.85rem", margin: "1.5rem 0" }}>
        <AvgTile label="Team avg" value={teamAvg} color={C.experience} />
        <AvgTile label={`${ai1Name} avg`} value={ai1Avg} color={C.offering} />
        <AvgTile label={`${ai2Name} avg`} value={ai2Avg} color={C.config} />
      </div>

      <Card style={{ marginBottom: "1.5rem" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.85rem" }}>
          <span className="label">Three-way comparison · Score by type</span>
        </div>
        <div style={{ height: "400px" }}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={chartData} margin={{ top: 5, right: 12, bottom: 60, left: 0 }}>
              <CartesianGrid strokeDasharray="2 4" stroke={C.borderMid} vertical={false} />
              <XAxis dataKey="shortName" tick={{ fontSize: 10, fill: C.textDim }} angle={-30} textAnchor="end" interval={0} stroke={C.borderHi} />
              <YAxis domain={[0, 10]} tick={{ fontSize: 11, fill: C.textDim }} stroke={C.borderHi} />
              <Tooltip
                contentStyle={{ backgroundColor: C.surface2, border: `1px solid ${C.borderHi}`, borderRadius: 8, color: C.text }}
                cursor={{ fill: "rgba(255,255,255,0.04)" }}
                labelFormatter={(label) => {
                  const item = chartData.find(d => d.shortName === label);
                  return item ? item.name : label;
                }}
              />
              <Legend wrapperStyle={{ paddingTop: "0.85rem" }} />
              <Bar dataKey="Team" fill={C.experience} radius={[3, 3, 0, 0]} />
              <Bar dataKey={ai1Name} fill={C.offering} radius={[3, 3, 0, 0]} />
              <Bar dataKey={ai2Name} fill={C.config} radius={[3, 3, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </Card>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "1rem" }}>
        <PatternBox title="Consensus" subtitle="All three within 1.5 points" color={C.success} icon={<CheckCircle2 size={14} />}>
          {consensus.length === 0 && <EmptyHint text="No three-way consensus yet." />}
          {consensus.slice(0, 4).map(c => (
            <PatternRow key={c.type} type={c.type} v1={c.team} v2={c.ai1} v3={c.ai2} ev={typeEvidence[c.type]} />
          ))}
        </PatternBox>

        <PatternBox title="Team vs. AIs" subtitle="Team disagrees with AI consensus" color={C.experience} icon={<Target size={14} />}>
          {teamVsAIs.map(c => (
            <PatternRow
              key={c.type} type={c.type}
              v1={c.team} v2={c.ai1} v3={c.ai2}
              note={`Team ${c.teamVsAI > 0 ? "higher" : "lower"} by ${Math.abs(c.teamVsAI).toFixed(1)}`}
              ev={typeEvidence[c.type]}
            />
          ))}
        </PatternBox>

        <PatternBox title="AIs disagree" subtitle={`${ai1Name} vs ${ai2Name}`} color={C.config} icon={<Zap size={14} />}>
          {aisDisagree.map(c => (
            <PatternRow
              key={c.type} type={c.type}
              v1={c.team} v2={c.ai1} v3={c.ai2}
              note={`AI spread: ${c.aiSpread.toFixed(1)}`}
              ev={typeEvidence[c.type]}
            />
          ))}
        </PatternBox>
      </div>

      <Card style={{ marginTop: "1.5rem", borderColor: `${C.config}40`, backgroundColor: `${C.config}08` }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.6rem" }}>
          <Sparkles size={14} color={C.config} />
          <span className="label" style={{ color: C.config }}>Discussion · 3 minutes</span>
        </div>
        <ol style={{ margin: 0, paddingLeft: "1.25rem", fontSize: "0.92rem", lineHeight: 1.65, color: C.text }}>
          <li><strong>Where AIs agree but disagree with you:</strong> Two independent models pattern-matching on similar evidence. What might they be picking up that the team missed?</li>
          <li><strong>Where AIs disagree with each other:</strong> The framework is genuinely ambiguous on this type for this company — or the models drew on different recent information. Which is it?</li>
          <li><strong>Where all three converge:</strong> Real signal, or just the conventional wisdom about this company that everyone has internalized?</li>
        </ol>
      </Card>

      <div style={{ display: "flex", justifyContent: "space-between", marginTop: "2rem" }}>
        <SecondaryButton onClick={onBack}><ChevronLeft size={15} /> Back</SecondaryButton>
        <PrimaryButton onClick={onContinue}>Tactic recommendations <ChevronRight size={15} /></PrimaryButton>
      </div>
    </div>
  );
}

function AvgTile({ label, value, color }) {
  return (
    <div style={{
      backgroundColor: C.surface,
      border: `1px solid ${C.border}`,
      borderTop: `2px solid ${color}`,
      borderRadius: "10px",
      padding: "0.85rem 1.1rem",
    }}>
      <div className="label" style={{ marginBottom: "0.3rem" }}>{label}</div>
      <div style={{ display: "flex", alignItems: "baseline", gap: "0.35rem" }}>
        <span className="mono" style={{ fontSize: "1.85rem", fontWeight: 600, color, fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>
          {value !== null ? value.toFixed(2) : "—"}
        </span>
        <span className="mono" style={{ fontSize: "11px", color: C.textMuted }}>/10</span>
      </div>
    </div>
  );
}

function PatternBox({ title, subtitle, color, icon, children }) {
  return (
    <div style={{
      backgroundColor: C.surface,
      border: `1px solid ${color}30`,
      borderTop: `2px solid ${color}`,
      borderRadius: "10px",
      padding: "0.95rem 1.1rem",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: "0.4rem", marginBottom: "0.2rem", color }}>
        {icon}
        <span className="label" style={{ color, fontWeight: 600 }}>{title}</span>
      </div>
      <div style={{ fontSize: "0.78rem", color: C.textDim, marginBottom: "0.85rem" }}>
        {subtitle}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: "0.6rem" }}>
        {children}
      </div>
    </div>
  );
}

function PatternRow({ type, v1, v2, v3, note, ev }) {
  return (
    <div style={{ paddingBottom: "0.5rem", borderBottom: `1px solid ${C.border}` }}>
      <div style={{ fontSize: "0.92rem", fontWeight: 600, marginBottom: "0.2rem", color: C.text }}>
        {type}
      </div>
      <div className="mono" style={{ fontSize: "10px", color: C.textDim, display: "flex", flexWrap: "wrap", gap: "0.4rem" }}>
        <span>T:<strong style={{ color: C.experience, marginLeft: "2px" }}>{v1.toFixed(1)}</strong></span>
        <span>A1:<strong style={{ color: C.offering, marginLeft: "2px" }}>{v2.toFixed(1)}</strong></span>
        <span>A2:<strong style={{ color: C.config, marginLeft: "2px" }}>{v3.toFixed(1)}</strong></span>
        {note && <span style={{ color: C.experience }}>· {note}</span>}
      </div>
      {ev && (
        <div style={{ fontSize: "0.82rem", fontStyle: "italic", color: C.textDim, marginTop: "0.3rem", lineHeight: 1.4 }}>
          "{ev}"
        </div>
      )}
    </div>
  );
}

function EmptyHint({ text }) {
  return (
    <div style={{ fontSize: "0.85rem", fontStyle: "italic", color: C.textMuted, padding: "0.4rem 0" }}>
      {text}
    </div>
  );
}

// ============================================================
// PHASE VI — TACTICS
// ============================================================

const MAX_TACTICS = 3;

function PhaseTactics({ companyName, teamTypeScores, tacticRecs, setTacticRecs, onContinue, onBack }) {
  const initialOpen = useMemo(() => {
    const sorted = [...TYPES_ORDER].sort((a, b) => teamTypeScores[a].score - teamTypeScores[b].score);
    return sorted.length ? sorted[0] : null;
  }, [teamTypeScores]);

  const [openType, setOpenType] = useState(initialOpen);
  const justificationRefs = useRef({});

  const handleContinue = () => {
    if (canContinue) {
      onContinue();
      return;
    }
    // Justifications missing — scroll to first empty one and focus it
    const firstEmpty = tacticRecs.find(r => !r.justification.trim());
    if (firstEmpty) {
      const key = `${firstEmpty.type}:${firstEmpty.name}`;
      const el = justificationRefs.current[key];
      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        setTimeout(() => el.focus(), 250);
      }
    }
  };

  const isSelected = (type, name) => tacticRecs.some(r => r.type === type && r.name === name);

  const addTactic = (type, name) => {
    if (tacticRecs.length >= MAX_TACTICS) return;
    if (isSelected(type, name)) return;
    setTacticRecs(prev => [...prev, { type, name, justification: "" }]);
  };

  const removeTactic = (type, name) => {
    setTacticRecs(prev => prev.filter(r => !(r.type === type && r.name === name)));
  };

  const updateJustification = (type, name, val) => {
    setTacticRecs(prev => prev.map(r =>
      (r.type === type && r.name === name) ? { ...r, justification: val } : r
    ));
  };

  const canContinue = tacticRecs.length >= 2 && tacticRecs.every(r => r.justification.trim().length > 0);

  return (
    <div>
      <PhaseHeader num="06" title="Tactic Recommendations" subtitle={`Doblin's library of 112 tactics — pick 2-3 ${companyName} should adopt next, and justify why.`} />

      <div style={{ marginTop: "1.25rem", marginBottom: "1.5rem", padding: "0.85rem 1.1rem", backgroundColor: C.accentDim, border: `1px solid ${C.accent}30`, borderRadius: "10px", display: "flex", gap: "0.75rem", alignItems: "flex-start" }}>
        <Layers size={16} color={C.accentBright} style={{ flexShrink: 0, marginTop: "2px" }} />
        <p style={{ margin: 0, fontSize: "0.9rem", lineHeight: 1.55, color: C.text }}>
          Tactics are concrete moves to innovate on a given type. Types are sorted with your team's <strong style={{ color: C.accentBright }}>lowest scores first</strong> — these are your opportunities. Click <span className="mono" style={{ color: C.accentBright }}>+</span> to recommend, then justify each pick on the right.
        </p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: "1.5rem", alignItems: "start" }}>
        {/* LEFT: tactic browser */}
        <div style={{ display: "flex", flexDirection: "column", gap: "0.6rem" }}>
          {[...TYPES_ORDER]
            .sort((a, b) => teamTypeScores[a].score - teamTypeScores[b].score)
            .map(typeName => {
              const info = TYPE_INFO[typeName];
              const catColor = CATEGORY_COLORS[info.category];
              const tactics = TACTICS.filter(t => t.type === typeName);
              const score = teamTypeScores[typeName];
              const isOpen = openType === typeName;
              const opportunity = score.score < 5;
              return (
                <div key={typeName} style={{
                  backgroundColor: C.surface,
                  border: `1px solid ${isOpen ? `${catColor}50` : C.border}`,
                  borderRadius: "10px",
                  overflow: "hidden",
                  transition: "all 0.15s",
                }}>
                  <button
                    onClick={() => setOpenType(isOpen ? null : typeName)}
                    style={{
                      width: "100%", display: "grid",
                      gridTemplateColumns: "auto 1fr auto auto",
                      alignItems: "center", gap: "0.85rem",
                      padding: "0.75rem 1rem",
                      backgroundColor: "transparent", border: "none",
                      cursor: "pointer", textAlign: "left",
                      color: C.text,
                    }}
                  >
                    <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                      <div style={{ width: "8px", height: "8px", borderRadius: "999px", backgroundColor: catColor, boxShadow: `0 0 6px ${catColor}80` }} />
                      <span className="mono" style={{ fontSize: "9px", color: catColor, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase" }}>{info.category}</span>
                    </div>
                    <h4 style={{ fontSize: "1rem", fontWeight: 600, margin: 0, color: C.text, display: "flex", alignItems: "center", gap: "0.6rem" }}>
                      {typeName}
                      {opportunity && (
                        <span style={{ padding: "0.1rem 0.4rem", backgroundColor: `${C.warning}20`, color: C.warning, borderRadius: "4px", fontSize: "9px", fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase" }}>
                          opportunity
                        </span>
                      )}
                    </h4>
                    <span className="mono" style={{ fontSize: "11px", color: C.textDim }}>
                      <strong style={{ color: catColor, fontSize: "13px" }}>{score.score.toFixed(1)}</strong>/10
                      <span style={{ marginLeft: "0.5rem", opacity: 0.7 }}>· {tactics.length}</span>
                    </span>
                    {isOpen ? <ChevronUp size={16} color={C.textDim} /> : <ChevronDown size={16} color={C.textDim} />}
                  </button>

                  {isOpen && (
                    <div style={{ padding: "0 1rem 0.85rem", display: "flex", flexDirection: "column", gap: "0.4rem" }}>
                      {tactics.map(t => {
                        const selected = isSelected(typeName, t.name);
                        const disabled = !selected && tacticRecs.length >= MAX_TACTICS;
                        return (
                          <div key={t.name} style={{
                            display: "grid",
                            gridTemplateColumns: "auto 1fr auto",
                            gap: "0.7rem",
                            alignItems: "center",
                            padding: "0.5rem 0.7rem",
                            backgroundColor: selected ? `${catColor}15` : C.surface2,
                            border: `1px solid ${selected ? `${catColor}40` : C.border}`,
                            borderRadius: "8px",
                          }}>
                            <span className="mono" style={{ fontSize: "10px", color: catColor, fontWeight: 700, minWidth: "110px" }}>
                              {t.name}
                            </span>
                            <p style={{ fontSize: "0.83rem", margin: 0, lineHeight: 1.4, color: C.textDim }}>
                              {t.desc}
                            </p>
                            <button
                              onClick={() => selected ? removeTactic(typeName, t.name) : addTactic(typeName, t.name)}
                              disabled={disabled}
                              className="mono"
                              style={{
                                padding: "0.3rem 0.55rem",
                                border: "none",
                                backgroundColor: selected ? C.danger : disabled ? C.surface3 : C.accent,
                                color: disabled ? C.textMuted : "white",
                                borderRadius: "5px",
                                fontSize: "10px", fontWeight: 600,
                                letterSpacing: "0.04em", textTransform: "uppercase",
                                cursor: disabled ? "not-allowed" : "pointer",
                                display: "flex", alignItems: "center", gap: "0.25rem",
                                transition: "all 0.15s",
                              }}
                            >
                              {selected ? <><XIcon size={11} /> Remove</> : <><Plus size={11} /> Add</>}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
        </div>

        {/* RIGHT: selected tactics + justifications */}
        <aside style={{ position: "sticky", top: "5rem", alignSelf: "start" }}>
          <Card style={{ borderColor: tacticRecs.length > 0 ? `${C.accent}40` : C.border }}>
            <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.4rem" }}>
              <Target size={14} color={C.accentBright} />
              <span className="label" style={{ color: C.accentBright }}>Recommendations · Justify Each</span>
            </div>
            <h3 style={{ fontSize: "1.15rem", fontWeight: 600, margin: "0 0 1rem", color: C.text }}>
              {tacticRecs.length} of {MAX_TACTICS} selected
            </h3>

            {tacticRecs.length === 0 && (
              <div style={{ fontSize: "0.88rem", lineHeight: 1.5, color: C.textDim, padding: "1rem 0", fontStyle: "italic" }}>
                Browse types on the left and click <span className="mono" style={{ fontStyle: "normal", color: C.accentBright }}>+ Add</span> to select tactics. Pick 2–3 total.
              </div>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: "0.85rem" }}>
              {tacticRecs.map((r, idx) => {
                const info = TYPE_INFO[r.type];
                const catColor = CATEGORY_COLORS[info.category];
                return (
                  <div key={`${r.type}:${r.name}`} style={{
                    backgroundColor: C.surface2,
                    border: `1px solid ${catColor}30`,
                    borderLeft: `3px solid ${catColor}`,
                    borderRadius: "8px",
                    padding: "0.75rem 0.9rem",
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.4rem" }}>
                      <div>
                        <div className="mono" style={{ fontSize: "9px", color: catColor, letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 700, marginBottom: "0.15rem" }}>
                          {String(idx + 1).padStart(2, "0")} · {r.type}
                        </div>
                        <div style={{ fontSize: "0.98rem", fontWeight: 600, color: C.text }}>
                          {r.name}
                        </div>
                      </div>
                      <button
                        onClick={() => removeTactic(r.type, r.name)}
                        style={{ background: "none", border: "none", cursor: "pointer", color: C.textDim, padding: "0.2rem", borderRadius: "5px" }}
                        onMouseEnter={(e) => { e.currentTarget.style.color = C.danger; }}
                        onMouseLeave={(e) => { e.currentTarget.style.color = C.textDim; }}
                      >
                        <XIcon size={13} />
                      </button>
                    </div>
                    <textarea
                      ref={(el) => { justificationRefs.current[`${r.type}:${r.name}`] = el; }}
                      value={r.justification}
                      onChange={(e) => updateJustification(r.type, r.name, e.target.value)}
                      placeholder={`Why this tactic for ${companyName}? What's the evidence? What would adoption require?`}
                      rows={3}
                      className="iw-input"
                      style={{ fontSize: "0.83rem", padding: "0.5rem 0.6rem" }}
                    />
                  </div>
                );
              })}
            </div>
          </Card>
        </aside>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", marginTop: "2rem" }}>
        <SecondaryButton onClick={onBack}><ChevronLeft size={15} /> Back</SecondaryButton>
        <PrimaryButton onClick={handleContinue} disabled={tacticRecs.length < 2}>
          {canContinue
            ? "Take-away"
            : tacticRecs.length < 2
              ? `Pick at least 2 tactics (${tacticRecs.length}/2)`
              : "Justify each tactic →"}
          <ChevronRight size={15} />
        </PrimaryButton>
      </div>
    </div>
  );
}

// ============================================================
// PHASE VII — TAKEAWAY
// ============================================================

function PhaseTakeaway({ companyName, teamName, teamAvg, ai1Avg, ai2Avg, ai1Name, ai2Name, triangulation, tacticRecs, downloadSummary, onBack }) {
  const fiveTypeRule = useMemo(() => {
    const teamHighs = triangulation.filter(g => g.team >= 7).length;
    const ai1Highs = triangulation.filter(g => g.ai1 >= 7).length;
    const ai2Highs = triangulation.filter(g => g.ai2 >= 7).length;
    return { teamHighs, ai1Highs, ai2Highs };
  }, [triangulation]);

  const maxHighs = Math.max(fiveTypeRule.teamHighs, fiveTypeRule.ai1Highs, fiveTypeRule.ai2Highs);

  return (
    <div style={{ maxWidth: "920px", margin: "0 auto" }}>
      <PhaseHeader num="07" title="The Take-Away" />

      <p style={{ fontSize: "1.1rem", lineHeight: 1.6, marginTop: "1.25rem", color: C.text }}>
        Your team's analysis of <strong style={{ color: C.accentBright }}>{companyName || "the company"}</strong>{teamName && <> from <strong style={{ color: C.accentBright }}>{teamName}</strong></>} is complete.
      </p>

      <Card style={{ marginTop: "1.5rem", borderColor: `${C.experience}40`, backgroundColor: `${C.experience}08` }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.6rem" }}>
          <Zap size={14} color={C.experience} />
          <span className="label" style={{ color: C.experience }}>Reflection · Five-Type Threshold</span>
        </div>
        <p style={{ fontSize: "0.98rem", lineHeight: 1.65, margin: 0, color: C.text }}>
          Keeley's research found companies innovating on <strong>five or more types simultaneously</strong> dramatically outperform single-type innovators. By the team's scoring, <strong>{companyName}</strong> innovates strongly (≥ 7) on <strong style={{ color: C.experience }}>{fiveTypeRule.teamHighs}</strong> {fiveTypeRule.teamHighs === 1 ? "type" : "types"}; by {ai1Name}, on <strong style={{ color: C.offering }}>{fiveTypeRule.ai1Highs}</strong>; by {ai2Name}, on <strong style={{ color: C.config }}>{fiveTypeRule.ai2Highs}</strong>.{" "}
          {maxHighs >= 5
            ? "By at least one measure, this company clears the threshold — the framework predicts durable advantage."
            : "None of the three observers see five-or-more strong types. The company has clear room to broaden its innovation portfolio."}
        </p>
      </Card>

      <Card style={{ marginTop: "1rem", borderColor: `${C.offering}40`, backgroundColor: `${C.offering}08` }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.6rem" }}>
          <Layers size={14} color={C.offering} />
          <span className="label" style={{ color: C.offering }}>Reflection · Triangulation, not Oracle</span>
        </div>
        <p style={{ fontSize: "0.98rem", lineHeight: 1.65, margin: 0, color: C.text }}>
          You consulted two different AI models, and they did not give identical scores. That spread is itself information: the framework has genuine ambiguity, the models have different training and access, and the team brings local context neither can match. The right way to use AI as an analytical assistant is the way you used it — as one voice among several, valued precisely because it disagrees.
        </p>
      </Card>

      <Card style={{ marginTop: "1rem", borderColor: `${C.config}40`, backgroundColor: `${C.config}08` }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.6rem" }}>
          <Target size={14} color={C.config} />
          <span className="label" style={{ color: C.config }}>Reflection · From Diagnosis to Recommendation</span>
        </div>
        <p style={{ fontSize: "0.98rem", lineHeight: 1.65, margin: 0, color: C.text }}>
          Diagnosis is the easy half. Recommendation requires you to commit. Your team selected <strong>{tacticRecs.length} {tacticRecs.length === 1 ? "tactic" : "tactics"}</strong>{tacticRecs.length > 0 && <>: {tacticRecs.map((r, i) => (
            <React.Fragment key={`${r.type}:${r.name}`}>
              {i > 0 && ", "}
              <strong style={{ color: CATEGORY_COLORS[TYPE_INFO[r.type].category] }}>{r.name}</strong>
            </React.Fragment>
          ))}</>}. Each carries an opportunity cost — what would adoption require this company to <em>stop</em> doing?
        </p>
      </Card>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1rem", marginTop: "2rem" }}>
        <PrimaryButton onClick={downloadSummary} style={{ padding: "1rem 1.25rem", justifyContent: "center" }}>
          <Download size={15} /> Export workshop results
        </PrimaryButton>
        <SecondaryButton onClick={onBack} style={{ padding: "1rem 1.25rem", justifyContent: "center" }}>
          <ChevronLeft size={15} /> Revisit tactics
        </SecondaryButton>
      </div>

      <div style={{ marginTop: "3rem", textAlign: "center", padding: "1.5rem 0", borderTop: `1px solid ${C.border}` }}>
        <p style={{ fontSize: "1.05rem", fontStyle: "italic", color: C.textDim, margin: 0, lineHeight: 1.5 }}>
          "Innovation is the elaboration of new combinations of existing knowledge."
        </p>
        <p className="mono" style={{ fontSize: "10px", color: C.textMuted, marginTop: "0.4rem", letterSpacing: "0.1em" }}>
          — JOSEPH SCHUMPETER, 1942
        </p>
      </div>
    </div>
  );
}

// ============================================================
// SHARED UI
// ============================================================

function PhaseHeader({ num, title, subtitle }) {
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.4rem" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.4rem", padding: "0.25rem 0.65rem", backgroundColor: C.accentDim, border: `1px solid ${C.accent}40`, borderRadius: "999px" }}>
          <span className="mono" style={{ fontSize: "10px", color: C.accentBright, fontWeight: 600, letterSpacing: "0.08em" }}>PHASE {num}</span>
        </div>
      </div>
      <h2 style={{ fontSize: "1.85rem", fontWeight: 600, margin: 0, color: C.text, letterSpacing: "-0.02em", lineHeight: 1.15 }}>
        {title}
      </h2>
      {subtitle && (
        <p style={{ margin: "0.4rem 0 0", fontSize: "0.95rem", color: C.textDim, lineHeight: 1.55 }}>
          {subtitle}
        </p>
      )}
    </div>
  );
}

function StepLabel({ num, title }) {
  return (
    <div style={{ marginBottom: "0.65rem" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.35rem" }}>
        <span style={{ padding: "0.2rem 0.5rem", backgroundColor: C.accent, color: "white", borderRadius: "5px", fontSize: "10px", fontWeight: 700, letterSpacing: "0.08em" }} className="mono">
          STEP {num}
        </span>
      </div>
      <h3 style={{ fontSize: "1.1rem", fontWeight: 600, margin: 0, color: C.text }}>
        {title}
      </h3>
    </div>
  );
}

function PrimaryButton({ children, onClick, disabled, style = {} }) {
  return (
    <button
      onClick={onClick} disabled={disabled} className="mono"
      style={{
        padding: "0.7rem 1.2rem",
        backgroundColor: disabled ? "rgba(59,130,246,0.25)" : C.accent,
        color: "white",
        border: "none",
        borderRadius: "8px",
        fontSize: "12px",
        fontWeight: 600,
        letterSpacing: "0.04em",
        textTransform: "uppercase",
        cursor: disabled ? "not-allowed" : "pointer",
        display: "inline-flex", alignItems: "center", gap: "0.5rem",
        transition: "all 0.15s",
        boxShadow: disabled ? "none" : `0 1px 2px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05) inset`,
        ...style,
      }}
      onMouseEnter={(e) => { if (!disabled) e.currentTarget.style.backgroundColor = C.accentBright; }}
      onMouseLeave={(e) => { if (!disabled) e.currentTarget.style.backgroundColor = C.accent; }}
    >
      {children}
    </button>
  );
}

function SecondaryButton({ children, onClick, style = {} }) {
  return (
    <button
      onClick={onClick} className="mono"
      style={{
        padding: "0.7rem 1.2rem",
        backgroundColor: C.surface2,
        color: C.text,
        border: `1px solid ${C.borderHi}`,
        borderRadius: "8px",
        fontSize: "12px",
        fontWeight: 500,
        letterSpacing: "0.04em",
        textTransform: "uppercase",
        cursor: "pointer",
        display: "inline-flex", alignItems: "center", gap: "0.5rem",
        transition: "all 0.15s",
        ...style,
      }}
      onMouseEnter={(e) => { e.currentTarget.style.backgroundColor = C.surface3; }}
      onMouseLeave={(e) => { e.currentTarget.style.backgroundColor = C.surface2; }}
    >
      {children}
    </button>
  );
}

function Card({ children, subtle, style = {} }) {
  return (
    <div style={{
      backgroundColor: subtle ? "transparent" : C.surface,
      border: `1px solid ${C.border}`,
      borderRadius: "12px",
      padding: "1.5rem",
      ...style,
    }}>
      {children}
    </div>
  );
}

function Field({ label, hint, required, children }) {
  return (
    <div style={{ marginBottom: "1.1rem" }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: "0.5rem", marginBottom: "0.4rem" }}>
        <span className="label">{label}</span>
        {required && <span style={{ fontSize: "10px", color: C.danger }}>required</span>}
        {hint && <span className="mono" style={{ fontSize: "10px", color: C.textMuted }}>{hint}</span>}
      </div>
      {children}
    </div>
  );
}

function ProgressPill({ label, value, total, accent }) {
  const pct = (value / total) * 100;
  const color = accent ? C.accent : C.success;
  return (
    <div style={{ padding: "0.45rem 0.85rem", backgroundColor: C.surface, border: `1px solid ${C.border}`, borderRadius: "999px", display: "flex", alignItems: "center", gap: "0.55rem" }}>
      <div style={{ width: "26px", height: "4px", backgroundColor: C.surface3, borderRadius: "999px", overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", backgroundColor: color, borderRadius: "999px", transition: "width 0.3s" }} />
      </div>
      <span className="mono" style={{ fontSize: "11px", color: C.text, fontWeight: 600 }}>
        {value}<span style={{ color: C.textDim, fontWeight: 400 }}>/{total}</span>
      </span>
      <span className="mono" style={{ fontSize: "9px", color: C.textDim, letterSpacing: "0.08em", textTransform: "uppercase" }}>{label}</span>
    </div>
  );
}

function ExportRow({ icon, title, subtitle, onClick, primary, done }) {
  const [hover, setHover] = useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: "flex",
        alignItems: "center",
        gap: "0.85rem",
        padding: "0.85rem 1rem",
        backgroundColor: hover ? C.surface2 : C.surface,
        border: `1px solid ${primary ? `${C.accent}40` : done ? `${C.success}40` : C.border}`,
        borderRadius: "10px",
        cursor: "pointer",
        textAlign: "left",
        transition: "all 0.15s",
        width: "100%",
        color: C.text,
      }}
    >
      <div style={{
        width: "36px", height: "36px",
        backgroundColor: primary ? C.accentDim : done ? `${C.success}15` : C.surface3,
        borderRadius: "8px",
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0,
      }}>
        {icon}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: "0.92rem", fontWeight: 600, color: C.text, marginBottom: "0.1rem" }}>{title}</div>
        <div style={{ fontSize: "0.78rem", color: C.textDim, lineHeight: 1.3 }}>{subtitle}</div>
      </div>
      <ChevronRight size={16} color={C.textDim} style={{ flexShrink: 0 }} />
    </button>
  );
}

    const rootEl = document.getElementById("root");
    rootEl.setAttribute("data-iw-mounted", "true");
    createRoot(rootEl).render(<InnovationWorkshop />);
  </script>
