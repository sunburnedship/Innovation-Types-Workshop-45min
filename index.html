const initialQuestionScores = () => {
  const obj = {};
  TYPES_ORDER.forEach(t => {
    QUESTIONS.filter(q => q.type === t).forEach((_, i) => {
      obj[`${t}:${i}`] = null;
    });
  });
  return obj;
};

const initialTypeEvidence = () => {
  const obj = {};
  TYPES_ORDER.forEach(t => { obj[t] = ""; });
  return obj;
};

const initialAIScores = () => {
  const obj = {};
  TYPES_ORDER.forEach(t => { obj[t] = null; });
  return obj;
};

const computeTypeScore = (typeName, qs) => {
  const w = WEIGHTS[typeName];
  const idxs = QUESTIONS.map((q, i) => q.type === typeName ? i : -1).filter(i => i >= 0);
  let sum = 0;
  let scored = 0;
  idxs.forEach(globalIdx => {
    const localIdx = QUESTIONS.slice(0, globalIdx).filter(q => q.type === typeName).length;
    const v = qs[`${typeName}:${localIdx}`];
    if (typeof v === "number") {
      sum += v * w;
      scored++;
    }
  });
  return { score: sum, scored, total: idxs.length };
};

const parseAIScores = (text) => {
  const out = {};
  TYPES_ORDER.forEach(t => { out[t] = null; });
  if (!text) return out;
  const lines = text.split(/\n/);
  for (const line of lines) {
    for (const t of TYPES_ORDER) {
      const re = new RegExp(`^\\s*[\\*\\-•·]?\\s*\\*?\\*?${t.replace(/\s+/g, "\\s+")}\\*?\\*?\\s*[:\\-—]\\s*(\\d+(?:\\.\\d+)?)`, "i");
      const m = line.match(re);
      if (m) {
        const v = parseFloat(m[1]);
        if (!isNaN(v) && v >= 0 && v <= 10) out[t] = v;
      }
    }
  }
  return out;
};

const buildAIPrompt = (companyName, companyContext) => {
  const ctx = companyContext.trim()
    ? `\n\nContext provided by the team: ${companyContext.trim()}`
    : "";
  return `You are an expert innovation analyst. Score ${companyName || "[COMPANY NAME]"} on Larry Keeley's Doblin Ten Types of Innovation framework, based on publicly available information.${ctx}

For each of the 10 types, give a score from 0 to 10:
  0 = absent / no innovation visible in this type
  5 = industry-normal
  10 = industry-redefining

Return your scores in this exact format, one per line, numbers only:

Profit Model: X
Network: X
Structure: X
Process: X
Product Performance: X
Product System: X
Service: X
Channel: X
Brand: X
Customer Engagement: X

Then in a single short paragraph (3–4 sentences), name the company's BIGGEST innovation strength and BIGGEST gap, with one concrete piece of evidence for each.`;
};

const escapeHTML = (s) => String(s ?? "")
  .replace(/&/g, "&amp;")
  .replace(/</g, "&lt;")
  .replace(/>/g, "&gt;")
  .replace(/"/g, "&quot;");

// ============================================================
// MAIN COMPONENT
// ============================================================

function InnovationWorkshop() {
  const [phase, setPhase] = useState(0);
  const [companyName, setCompanyName] = useState("");
  const [companyContext, setCompanyContext] = useState("");
  const [teamName, setTeamName] = useState("");

  const [questionScores, setQuestionScores] = useState(initialQuestionScores());
  const [typeEvidence, setTypeEvidence] = useState(initialTypeEvidence());

  const [ai1Name, setAi1Name] = useState("");
  const [ai1Raw, setAi1Raw] = useState("");
  const [ai1Scores, setAi1Scores] = useState(initialAIScores());

  const [ai2Name, setAi2Name] = useState("");
  const [ai2Raw, setAi2Raw] = useState("");
  const [ai2Scores, setAi2Scores] = useState(initialAIScores());

  const [tacticRecs, setTacticRecs] = useState([]);

  const [copied1, setCopied1] = useState(false);
  const [copied2, setCopied2] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [summaryOpen, setSummaryOpen] = useState(false);
  const [summaryCopied, setSummaryCopied] = useState(false);

  // Load persisted
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get(STORAGE_KEY);
        if (r && r.value) {
          const s = JSON.parse(r.value);
          if (s.companyName !== undefined) setCompanyName(s.companyName);
          if (s.companyContext !== undefined) setCompanyContext(s.companyContext);
          if (s.teamName !== undefined) setTeamName(s.teamName);
          if (s.questionScores) setQuestionScores(s.questionScores);
          if (s.typeEvidence) setTypeEvidence(s.typeEvidence);
          if (s.ai1Name) setAi1Name(s.ai1Name);
          if (s.ai1Raw) setAi1Raw(s.ai1Raw);
          if (s.ai1Scores) setAi1Scores(s.ai1Scores);
          if (s.ai2Name) setAi2Name(s.ai2Name);
          if (s.ai2Raw) setAi2Raw(s.ai2Raw);
          if (s.ai2Scores) setAi2Scores(s.ai2Scores);
          if (s.tacticRecs) setTacticRecs(s.tacticRecs);
          if (typeof s.phase === "number") setPhase(s.phase);
        }
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  // Persist
  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        await window.storage.set(STORAGE_KEY, JSON.stringify({
          phase, companyName, companyContext, teamName,
          questionScores, typeEvidence,
          ai1Name, ai1Raw, ai1Scores, ai2Name, ai2Raw, ai2Scores,
          tacticRecs,
        }));
      } catch (e) {}
    })();
  }, [phase, companyName, companyContext, teamName, questionScores, typeEvidence,
      ai1Name, ai1Raw, ai1Scores, ai2Name, ai2Raw, ai2Scores, tacticRecs, loaded]);

  // Re-parse AI raw on change
  useEffect(() => { setAi1Scores(parseAIScores(ai1Raw)); }, [ai1Raw]);
  useEffect(() => { setAi2Scores(parseAIScores(ai2Raw)); }, [ai2Raw]);

  // Computed
  const teamTypeScores = useMemo(() => {
    const obj = {};
    TYPES_ORDER.forEach(t => { obj[t] = computeTypeScore(t, questionScores); });
    return obj;
  }, [questionScores]);

  const teamComplete = useMemo(() => {
    return TYPES_ORDER.every(t => teamTypeScores[t].scored === teamTypeScores[t].total);
  }, [teamTypeScores]);

  const ai1Complete = useMemo(() => TYPES_ORDER.every(t => typeof ai1Scores[t] === "number"), [ai1Scores]);
  const ai2Complete = useMemo(() => TYPES_ORDER.every(t => typeof ai2Scores[t] === "number"), [ai2Scores]);

  const teamAvg = useMemo(() => {
    const vals = TYPES_ORDER.map(t => teamTypeScores[t].scored === teamTypeScores[t].total ? teamTypeScores[t].score : null).filter(v => v !== null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  }, [teamTypeScores]);

  const ai1Avg = useMemo(() => {
    const vals = TYPES_ORDER.map(t => ai1Scores[t]).filter(v => typeof v === "number");
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  }, [ai1Scores]);

  const ai2Avg = useMemo(() => {
    const vals = TYPES_ORDER.map(t => ai2Scores[t]).filter(v => typeof v === "number");
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  }, [ai2Scores]);

  const triangulation = useMemo(() => {
    const items = TYPES_ORDER.map(t => {
      const team = teamTypeScores[t].scored === teamTypeScores[t].total ? teamTypeScores[t].score : null;
      const a1 = ai1Scores[t];
      const a2 = ai2Scores[t];
      if (team == null || typeof a1 !== "number" || typeof a2 !== "number") return null;
      const aiAvg = (a1 + a2) / 2;
      return {
        type: t,
        team, ai1: a1, ai2: a2,
        aiAvg,
        teamVsAI: team - aiAvg,
        aiSpread: Math.abs(a1 - a2),
        spread: Math.max(team, a1, a2) - Math.min(team, a1, a2),
      };
    }).filter(Boolean);
    return items;
  }, [teamTypeScores, ai1Scores, ai2Scores]);

  const handleReset = async () => {
    if (!window.confirm("Reset everything? This will clear all scores, evidence, AI responses, and tactic recommendations.")) return;
    setPhase(0);
    setCompanyName(""); setCompanyContext(""); setTeamName("");
    setQuestionScores(initialQuestionScores());
    setTypeEvidence(initialTypeEvidence());
    setAi1Name(""); setAi1Raw(""); setAi1Scores(initialAIScores());
    setAi2Name(""); setAi2Raw(""); setAi2Scores(initialAIScores());
    setTacticRecs([]);
    try { await window.storage.delete(STORAGE_KEY); } catch (e) {}
  };

  // ============================================================
  // EXPORT — Word doc (HTML+MSO) + plain-text fallback
  // ============================================================

  const buildWordHTML = () => {
    const dateStr = new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
    const catColorHex = (cat) => ({ Configuration: "#7C3AED", Offering: "#059669", Experience: "#EA580C" })[cat];

    const scoreRows = TYPES_ORDER.map(t => {
      const team = teamTypeScores[t];
      const teamStr = team.scored === team.total ? team.score.toFixed(2) : "—";
      const a1 = typeof ai1Scores[t] === "number" ? ai1Scores[t].toFixed(2) : "—";
      const a2 = typeof ai2Scores[t] === "number" ? ai2Scores[t].toFixed(2) : "—";
      const cat = TYPE_INFO[t].category;
      return `<tr>
        <td><strong>${escapeHTML(t)}</strong></td>
        <td><span style="color:${catColorHex(cat)};font-size:9pt;font-weight:600;">${cat}</span></td>
        <td class="num">${teamStr}</td>
        <td class="num">${a1}</td>
        <td class="num">${a2}</td>
      </tr>`;
    }).join("\n");

    const tacticBlocks = tacticRecs.length ? tacticRecs.map((r, i) => {
      const cat = TYPE_INFO[r.type].category;
      const cc = catColorHex(cat);
      return `<div style="border-left:3pt solid ${cc};padding:8pt 14pt;margin:8pt 0;background:#F8FAFC;">
        <div style="font-size:9pt;color:#64748B;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:2pt;">${String(i+1).padStart(2,"0")} · ${escapeHTML(r.type)} · <span style="color:${cc};">${cat}</span></div>
        <div style="font-size:13pt;font-weight:600;color:#0F172A;margin-bottom:4pt;">${escapeHTML(r.name)}</div>
        <div style="font-size:11pt;color:#334155;font-style:italic;">${escapeHTML(r.justification || "(no justification recorded)")}</div>
      </div>`;
    }).join("\n") : `<p style="color:#64748B;font-style:italic;">No tactics recorded.</p>`;

    const detailedSections = TYPES_ORDER.map(t => {
      const cat = TYPE_INFO[t].category;
      const cc = catColorHex(cat);
      const qs = QUESTIONS.filter(q => q.type === t);
      const team = teamTypeScores[t];
      const teamStr = team.scored === team.total ? team.score.toFixed(2) : "—";
      const qRows = qs.map((q, i) => {
        const v = questionScores[`${t}:${i}`];
        return `<tr><td style="width:36pt;"><strong>Q${i+1}</strong></td><td>${escapeHTML(q.text)}</td><td class="num" style="width:42pt;">${typeof v === "number" ? `${v}/3` : "—"}</td></tr>`;
      }).join("\n");
      const evidenceRow = typeEvidence[t]
        ? `<p style="font-size:10pt;color:#475569;margin-top:4pt;"><strong style="color:${cc};">Evidence:</strong> <em>${escapeHTML(typeEvidence[t])}</em></p>`
        : "";
      return `<h3 style="color:${cc};">${escapeHTML(t)} <span style="font-size:10pt;color:#94A3B8;font-weight:normal;">· ${cat} · ${teamStr}/10</span></h3>
        <table>${qRows}</table>
        ${evidenceRow}`;
    }).join("\n");

    // ----- Triangulation section -----
    const teamColorHex = "#EA580C";
    const ai1ColorHex = "#059669";
    const ai2ColorHex = "#7C3AED";

    // Pull score arrays for each source; nulls excluded from stats
    const teamScoresArr = TYPES_ORDER.map(t => teamTypeScores[t].scored === teamTypeScores[t].total ? teamTypeScores[t].score : null).filter(v => v !== null);
    const ai1ScoresArr = TYPES_ORDER.map(t => ai1Scores[t]).filter(v => typeof v === "number");
    const ai2ScoresArr = TYPES_ORDER.map(t => ai2Scores[t]).filter(v => typeof v === "number");

    const stdDev = (vals) => {
      if (vals.length < 2) return null;
      const m = vals.reduce((a, b) => a + b, 0) / vals.length;
      const variance = vals.reduce((s, v) => s + (v - m) ** 2, 0) / (vals.length - 1);
      return Math.sqrt(variance);
    };

    const teamSD = stdDev(teamScoresArr);
    const ai1SD = stdDev(ai1ScoresArr);
    const ai2SD = stdDev(ai2ScoresArr);

    const fmt = (v) => v !== null && v !== undefined && !isNaN(v) ? v.toFixed(2) : "—";

    const avgTile = (label, value, sd, color) => `
      <td style="width:33.3%;border-top:2pt solid ${color};padding:10pt 14pt;background:#F8FAFC;">
        <div style="font-size:9pt;color:#64748B;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;margin-bottom:3pt;">${label}</div>
        <div style="font-size:22pt;color:${color};font-family:Consolas,monospace;font-weight:600;line-height:1.1;">${fmt(value)}<span style="font-size:11pt;color:#94A3B8;font-weight:400;">/10</span></div>
        <div style="font-size:9pt;color:#64748B;font-family:Consolas,monospace;margin-top:5pt;">SD <strong style="color:#475569;">${fmt(sd)}</strong></div>
      </td>`;

    const avgsRow = `
      <table style="width:100%;border-collapse:separate;border-spacing:6pt 0;margin:8pt 0 14pt;">
        <tr>
          ${avgTile("Team", teamAvg, teamSD, teamColorHex)}
          ${avgTile(`${escapeHTML(ai1Name)}`, ai1Avg, ai1SD, ai1ColorHex)}
          ${avgTile(`${escapeHTML(ai2Name)}`, ai2Avg, ai2SD, ai2ColorHex)}
        </tr>
      </table>`;

    // Vertical bar chart — 10 type groups, 3 bars per group (Team / AI1 / AI2)
    const CHART_H = 150;        // pt — bar area height
    const BAR_W = 11;           // pt — width of each colored bar
    const INNER_GAP = 1;        // pt — gap between the 3 bars within a type group
    const GROUP_GAP = 7;        // pt — gap between type groups

    const SHORT_LABELS = {
      "Profit Model": "Profit<br/>Model",
      "Network": "Network",
      "Structure": "Structure",
      "Process": "Process",
      "Product Performance": "Product<br/>Performance",
      "Product System": "Product<br/>System",
      "Service": "Service",
      "Channel": "Channel",
      "Brand": "Brand",
      "Customer Engagement": "Customer<br/>Engagement",
    };

    const verticalBar = (val, color) => {
      const v = typeof val === "number" ? val : 0;
      const filled = Math.max(0, (v / 10) * CHART_H);
      const empty = CHART_H - filled;
      const labelStr = typeof val === "number" ? val.toFixed(1) : "—";
      return `<td style="vertical-align:bottom;padding:0 ${INNER_GAP}pt;">
        <div style="font-size:7pt;text-align:center;color:${color};font-family:Consolas,monospace;font-weight:600;line-height:1;margin-bottom:2pt;">${labelStr}</div>
        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;width:${BAR_W}pt;">
          <tr><td style="height:${empty.toFixed(1)}pt;line-height:${empty.toFixed(1)}pt;font-size:1pt;mso-line-height-rule:exactly;">&nbsp;</td></tr>
          <tr><td style="height:${filled.toFixed(1)}pt;line-height:${filled.toFixed(1)}pt;font-size:1pt;background:${color};mso-line-height-rule:exactly;border-top:0.5pt solid ${color};">&nbsp;</td></tr>
        </table>
      </td>`;
    };

    const groupCells = TYPES_ORDER.map((t, idx) => {
      const team = teamTypeScores[t].scored === teamTypeScores[t].total ? teamTypeScores[t].score : null;
      const a1 = ai1Scores[t];
      const a2 = ai2Scores[t];
      const padLeft = idx === 0 ? 0 : GROUP_GAP;
      return `<td style="vertical-align:bottom;padding:0 0 0 ${padLeft}pt;">
        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;"><tr>
          ${verticalBar(team, teamColorHex)}
          ${verticalBar(a1, ai1ColorHex)}
          ${verticalBar(a2, ai2ColorHex)}
        </tr></table>
      </td>`;
    }).join("");

    const labelCells = TYPES_ORDER.map((t, idx) => {
      const padLeft = idx === 0 ? 0 : GROUP_GAP;
      return `<td style="text-align:center;vertical-align:top;padding:5pt ${padLeft / 2}pt 0 ${padLeft / 2}pt;font-size:7.5pt;color:#475569;line-height:1.2;">${SHORT_LABELS[t]}</td>`;
    }).join("");

    const legendSwatch = (color, name) => `<span style="display:inline-block;margin-right:14pt;font-size:9pt;color:#475569;"><span style="display:inline-block;width:9pt;height:9pt;background:${color};vertical-align:middle;margin-right:4pt;border:0.5pt solid ${color};"></span>${escapeHTML(name)}</span>`;

    const chartTable = `
      <div style="margin:6pt 0 6pt 0;">
        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin:0 auto;">
          <tr style="height:${CHART_H + 12}pt;">${groupCells}</tr>
          <tr>${labelCells}</tr>
        </table>
        <div style="text-align:center;margin-top:6pt;">
          ${legendSwatch(teamColorHex, "Team")}
          ${legendSwatch(ai1ColorHex, ai1Name)}
          ${legendSwatch(ai2ColorHex, ai2Name)}
        </div>
      </div>`;

    // Pattern analysis — only types where all three sources have scored
    const consensusItems = triangulation.filter(i => i.spread <= 1.5).sort((a, b) => b.team - a.team).slice(0, 4);
    const teamVsAIsItems = [...triangulation].sort((a, b) => Math.abs(b.teamVsAI) - Math.abs(a.teamVsAI)).slice(0, 3);
    const aisDisagreeItems = [...triangulation].sort((a, b) => b.aiSpread - a.aiSpread).slice(0, 3);

    const patternItem = (item, note) => `
      <div style="padding:5pt 0;border-bottom:0.25pt solid #E2E8F0;">
        <div style="font-size:10pt;font-weight:600;color:#0F172A;">${escapeHTML(item.type)}</div>
        <div style="font-size:9pt;font-family:Consolas,monospace;color:#64748B;margin-top:2pt;">
          Team:&nbsp;<strong style="color:${teamColorHex};">${item.team.toFixed(1)}</strong>
          &nbsp;·&nbsp;${escapeHTML(ai1Name)}:&nbsp;<strong style="color:${ai1ColorHex};">${item.ai1.toFixed(1)}</strong>
          &nbsp;·&nbsp;${escapeHTML(ai2Name)}:&nbsp;<strong style="color:${ai2ColorHex};">${item.ai2.toFixed(1)}</strong>
          ${note ? `&nbsp;&nbsp;<span style="color:#475569;font-style:italic;">— ${escapeHTML(note)}</span>` : ""}
        </div>
        ${typeEvidence[item.type] ? `<div style="font-size:9pt;font-style:italic;color:#475569;margin-top:3pt;">"${escapeHTML(typeEvidence[item.type])}"</div>` : ""}
      </div>`;

    const patternBlock = (title, subtitle, color, items, noteFn) => `
      <div style="padding:8pt 12pt;border:0.5pt solid #E2E8F0;border-left:2pt solid ${color};background:#F8FAFC;margin:6pt 0;">
        <div style="display:block;margin-bottom:2pt;">
          <span style="font-size:10pt;font-weight:600;color:${color};letter-spacing:0.04em;text-transform:uppercase;">${title}</span>
          <span style="font-size:9pt;color:#94A3B8;margin-left:6pt;">— ${subtitle}</span>
        </div>
        ${items.length === 0
          ? `<div style="font-size:9pt;color:#94A3B8;font-style:italic;padding:3pt 0;">None.</div>`
          : items.map(item => patternItem(item, noteFn ? noteFn(item) : null)).join("")}
      </div>`;

    const patternsTable = `
      ${patternBlock("Consensus", "All three within 1.5 points", "#059669", consensusItems, null)}
      ${patternBlock("Team vs. AIs", "Team disagrees with AI consensus", "#EA580C", teamVsAIsItems, c => `Team ${c.teamVsAI > 0 ? "higher" : "lower"} by ${Math.abs(c.teamVsAI).toFixed(1)}`)}
      ${patternBlock("AIs Disagree", `${ai1Name} vs ${ai2Name}`, "#7C3AED", aisDisagreeItems, c => `AI spread: ${c.aiSpread.toFixed(1)}`)}`;

    const triangulationSection = triangulation.length > 0 ? `
<h2>Triangulation</h2>
<p style="font-size:10pt;color:#64748B;margin:0 0 4pt;">Three perspectives on ${escapeHTML(companyName || "the company")}'s innovation profile — the team's collective scoring, ${escapeHTML(ai1Name)}'s independent assessment, and ${escapeHTML(ai2Name)}'s.</p>

<h3 style="margin-top:14pt;font-size:11pt;color:#0F172A;">Average Scores by Source</h3>
${avgsRow}

<h3 style="font-size:11pt;color:#0F172A;">Score by Type · Three-Way Comparison</h3>
${chartTable}

<h3 style="font-size:11pt;color:#0F172A;page-break-after:avoid;mso-page-break-after:avoid;">Pattern Analysis</h3>
<div style="page-break-inside:avoid;mso-page-break-inside:avoid;">
${patternsTable}
</div>
` : `
<h2>Triangulation</h2>
<p style="font-size:10pt;color:#64748B;font-style:italic;">Triangulation requires complete scoring from the team and both AI analysts. This section is empty because at least one source did not score every type.</p>
`;

    return `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
<head>
<meta charset='utf-8'>
<title>${escapeHTML(companyName || "Innovation Analysis")} — Innovation Workshop</title>
